<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strapi Sqills</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <span class="topbar__title">Strapi Sqills</span>
      <div class="topbar__controls">
        <label class="marker-field">
          <span class="marker-field__label">marker</span>
          <input type="text" id="marker" class="marker-field__input" placeholder="optional" />
        </label>
        <button type="button" id="reset-token" class="ghost-link">Reset token</button>
      </div>
    </div>
  </header>

  <main class="page">
    <!-- drop zone, parse summary, send button, result panel — added in later tasks -->
  </main>

<div id="token-modal" class="modal" hidden>
  <div class="modal__backdrop"></div>
  <div class="modal__panel" role="dialog" aria-labelledby="token-modal-title">
    <h2 id="token-modal-title" class="modal__title">Strapi API token</h2>
    <p class="modal__body">Paste your Strapi API token. It will be stored in your browser only — never sent anywhere except Strapi itself.</p>
    <input type="password" id="token-input" class="modal__input" autocomplete="off" placeholder="paste token here" />
    <p class="modal__error" id="token-error" hidden>Please paste a token.</p>
    <button type="button" id="token-save" class="btn-primary">Save</button>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
